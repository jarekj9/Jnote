# Build and publish Docker images to Docker Hub.
#
# Triggered only by semver-style tag pushes (e.g. `git tag 1.0.0 && git push
# origin 1.0.0`). Each job builds a multi-arch image (amd64 + arm64), tags
# it with the semver + a `latest` (only on stable releases) + a short sha,
# and pushes to Docker Hub under the configured user's namespace.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — a Docker Hub access token (NOT your password):
#                          https://hub.docker.com/settings/security
#
# Pushed image names:
#   <dockerhub-username>/jnote-backend:<semver>
#   <dockerhub-username>/jnote-backend:latest                  (stable releases only)
#   <dockerhub-username>/jnote-backend:sha-<short-sha>
#   <dockerhub-username>/jnote-frontend:<semver>
#   <dockerhub-username>/jnote-frontend:latest
#   <dockerhub-username>/jnote-frontend:sha-<short-sha>

name: Build and publish Docker images

on:
  push:
    tags:
      - '*.*.*'   # matches 1.0.0, 2.1.3, 1.0.0-rc.1, etc. Does NOT match v1.0.0.

env:
  REGISTRY: docker.io

jobs:
  backend:
    name: Build & push jnote-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/jnote-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=sha,format=short
          # latest=auto: only set `latest` for stable semver (not pre-releases).
          flavor: latest=auto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Build & push jnote-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/jnote-frontend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=sha,format=short
          flavor: latest=auto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
