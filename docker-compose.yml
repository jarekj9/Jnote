services:
  jnote_backend:
    build: ./backend
    container_name: jnote_backend
    hostname: jnote_backend
    restart: unless-stopped
    # All knobs (JWT_SECRET, GOOGLE_*, RATE_LIMIT_*, etc.) are loaded from
    # the root .env file via env_file. The .env.example documents them.
    env_file: .env
    # Only container-specific values that are NOT in .env
    environment:
      PORT: 3000
      DB_PATH: /data/jnote.sqlite
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env before starting}
    volumes:
      - jnote_data:/data

  jnote_frontend:
    build: ./frontend
    container_name: jnote_frontend
    hostname: jnote_frontend
    restart: unless-stopped
    depends_on:
      - jnote_backend
    # Frontend is static — no env vars needed in the container.
    # HOST_PORT is read directly from the shell env (populated by Compose
    # from .env) for the host-side port mapping below.
    ports:
      - "${HOST_PORT:-8080}:80"

volumes:
  jnote_data:
